<!-- Challenge 1: Font Size Controller
Problem Statement
You are creating a simple reading page where users can adjust the text size to make it more comfortable for them to read. The page shows a paragraph with some text and two buttons: one to make the text larger and one to make it smaller. Each time a button is clicked, the paragraph’s font size should update immediately.

Your Task
In HTML, create:
A <p> element with some sample text. Give it the id textPara.
Two buttons:
One labeled Increase Size with id increaseBtn.
One labeled Decrease Size with id decreaseBtn.
In JavaScript:
Use getElementById() to access the paragraph and both buttons.
Create a variable named size to store the current font size. Start it at 16.
Set the paragraph’s font size to this value when the page loads.
When Increase Size is clicked:
Add 2 to the size variable.
Update the paragraph’s font size.
When Decrease Size is clicked:
Subtract 2 from the size variable.
Update the paragraph’s font size.
Note: When setting the font size, make sure to include 'px' after the number.

Save
HTML
JavaScript
 -->


 <!DOCTYPE html>
<html>
<head>
  <title>My Page</title>
</head>
<body>
 <p id="textPara">My webpage</p>
 <button id="increaseBtn">Increase Size</button>
 <button id="decreaseBtn">Decrease Size</button>
 <script src="script.js"></script>
</body>
</html>
