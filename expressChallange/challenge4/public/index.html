<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            background-color: aquamarine;
        }
    </style>
</head>

<body>
    <h1>Articles</h1>
    <div id="articles"></div>
    <div id="articleDetails"></div>
   <script>
    const articlesDiv = document.getElementById("articles");
    const articleDetailsDiv = document.getElementById("articleDetails");

    async function fetchArticles() {
        try {
            let response = await fetch('/articles');
            let data = await response.json();

            data.forEach(function (article) {
                const titleElement = document.createElement("div");
                titleElement.innerText = article.title;

                titleElement.addEventListener('click', async function () {
                    try {
                        let res = await fetch(`/articles/${article.slug}`);
                        let fullArticle = await res.json();

                        articleDetailsDiv.innerHTML = `
                            <h2>${fullArticle.title}</h2>
                            <p>${fullArticle.content}</p>
                        `;
                    } catch (err) {
                        console.log(err);
                    }
                });

                articlesDiv.appendChild(titleElement);
            });

        } catch (err) {
            console.log(err);
        }
    }
 
    fetchArticles();
</script>
</body>

</html>
